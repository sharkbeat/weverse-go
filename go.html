<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weverse 商品跳轉</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: rgba(22, 27, 34, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 36px 28px;
    max-width: 420px; width: 100%; text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .region {
    display: inline-block; padding: 5px 14px;
    border-radius: 20px; font-size: 13px;
    font-weight: 600; margin-bottom: 20px;
  }
  .region-KR { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .region-JP { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .region-US { background: rgba(59,130,246,0.15); color: #93c5fd; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #8b949e; margin-bottom: 28px; line-height: 1.5; }
  .steps {
    text-align: left; background: rgba(255,255,255,0.03);
    border-radius: 12px; padding: 16px 18px;
    margin-bottom: 20px; font-size: 13px;
    line-height: 1.8; color: #c9d1d9;
  }
  .steps .step { margin-bottom: 8px; }
  .steps .step.done { color: #00e676; }
  .steps .step.active { color: #58a6ff; font-weight: 600; }
  .steps .step.pending { color: #484f58; }
  .btn {
    display: block; width: 100%; padding: 16px;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent; text-decoration: none; color: inherit;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, #00e676, #00c853); color: #000; margin-bottom: 12px; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: rgba(255,255,255,0.06); color: #8b949e; font-size: 14px; font-weight: 500; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(88,166,255,0.3); border-top-color: #58a6ff;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .invalid { color: #ff6b6b; font-size: 15px; margin-top: 12px; }
  .countdown { font-size: 12px; color: #484f58; margin-top: 12px; }
</style>
</head>
<body>
<div class="card" id="app"></div>
<script>
  var params = new URLSearchParams(window.location.search);
  var productUrl = params.get('url') || '';
  var region = (params.get('region') || 'US').toUpperCase();

  var regionLabels = { KR: '🇰🇷 韓國 (KRW)', JP: '🇯🇵 日本 (JPY)', US: '🇺🇸 美國 (USD)' };
  var currencyMap  = { KR: 'KRW', JP: 'JPY', US: 'USD' };
  var currency = currencyMap[region] || 'USD';
  var regionLabel = regionLabels[region] || region;

  var setRegionUrl = 'https://shop.weverse.io/zh-tw/home?shopAndCurrency=' + currency;
  var app = document.getElementById('app');

  if (!productUrl) {
    app.innerHTML = '<p class="invalid">❌ 缺少商品連結（?url= 參數）</p>';
  } else {
    app.innerHTML =
      '<span class="region region-' + region + '">' + regionLabel + '</span>' +
      '<h1>開啟 Weverse 商品</h1>' +
      '<p class="sub">兩步驟自動設定地區並跳轉至商品頁</p>' +
      '<div class="steps" id="steps">' +
        '<div class="step active" id="s1">① 點擊按鈕 → 設定地區為 ' + currency + '</div>' +
        '<div class="step pending" id="s2">② 自動跳轉至商品頁面</div>' +
      '</div>' +
      '<button class="btn btn-primary" id="btn-go" onclick="go()">🛒 設定地區並前往商品</button>' +
      '<a href="' + encodeHTML(productUrl) + '&shopAndCurrency=' + currency + '" class="btn btn-secondary">直接開啟（如果稍後跳轉失敗）</a>' +
      '<div class="countdown" id="cd" style="display:none"></div>';
  }

  function encodeHTML(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var started = false;
  function go() {
    if (started) return;
    started = true;

    var btn = document.getElementById('btn-go');
    var s1 = document.getElementById('s1');
    var s2 = document.getElementById('s2');
    var cd = document.getElementById('cd');

    btn.textContent = '⏳ 正在設定地區...';
    btn.disabled = true;
    s1.className = 'step active';
    s1.innerHTML = '<span class="spinner"></span> ① 正在利用首頁隱寫地區 ' + currency + '...';

    // 造一個隱形 iframe 偷讀 Weverse 首頁掛參數洗掉地區
    var iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = setRegionUrl;
    document.body.appendChild(iframe);

    var countdown = 4;
    cd.style.display = 'block';
    cd.textContent = countdown + ' 秒後跳轉...';

    var timer = setInterval(function() {
      countdown--;
      cd.textContent = countdown + ' 秒後跳轉...';
      if (countdown <= 0) {
        clearInterval(timer);
        s1.className = 'step done';
        s1.textContent = '✅ ① 地區已設定為 ' + currency;
        s2.className = 'step active';
        s2.innerHTML = '<span class="spinner"></span> ② 正在跳轉至商品頁面...';

        var sep = productUrl.indexOf('?') >= 0 ? '&' : '?';
        window.location.replace(productUrl + sep + 'shopAndCurrency=' + currency);
      }
    }, 1000);
  }
</script>
</body>
</html>
